<div id="login-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center">

    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md relative">

        <button class="close-modal-btn absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-2xl">&times;</button>

        <h2 class="text-2xl font-bold text-center mb-6 text-brand-dark">Welcome Back</h2>

        <form id="login-form" novalidate>
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-blue" placeholder="you@example.com" data-cy="login-email">
            </div>

            <div class="mb-2">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-blue" placeholder="••••••••" data-cy="login-password">
            </div>

            <div class="flex justify-end mb-6">
                <button type="button"
                        class="text-sm text-brand-blue hover:underline modal-trigger"
                        data-modal-url="/static/html/_reset_modal.html">
                    Forgot Password?
                </button>
            </div>

            <button type="submit" class="w-full bg-brand-blue text-white py-2 rounded-md hover:bg-opacity-90 transition font-semibold" data-cy="login-submit-button">
                Log In
            </button>
            <span id="form-error" class="error-message" data-cy="login-form-error"></span>
        </form>

    </div>
</div>
