<div id="reset-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center">
    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md relative">
        <button class="close-modal-btn absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-2xl">&times;</button>
        <h2 class="text-2xl font-bold text-center mb-6 text-brand-dark">Reset Password</h2>

        <form id="reset-request-form" novalidate>
            <div class="mb-4">
                <label for="reset-email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="reset-email" name="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-blue">
            </div>
            <button type="submit" class="w-full bg-brand-blue text-white py-2 rounded-md hover:bg-opacity-90 transition font-semibold">
                Next
            </button>
            <span id="reset-request-error" class="error-message text-red-500 text-sm mt-2 block"></span>
        </form>

        <form id="reset-confirm-form" class="hidden" novalidate>
            <p id="security-question-display" class="mb-4 text-lg font-medium text-brand-blue text-center"></p>

            <div class="mb-4">
                <label for="reset-answer" class="block text-sm font-medium text-gray-700 mb-1">Security Answer</label>
                <input type="text" id="reset-answer" name="security_answer" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-blue">
            </div>

            <div class="mb-6">
                <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input type="password" id="new-password" name="new_password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-blue">
            </div>

            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-opacity-90 transition font-semibold">
                Reset Password
            </button>
            <span id="reset-confirm-error" class="error-message text-red-500 text-sm mt-2 block"></span>
        </form>
    </div>
</div>
